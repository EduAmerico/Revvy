server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:revvydb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: update   # DEV apenas (em PROD use migrações Flyway)
    show-sql: true

  h2:
    console:
      enabled: true
      path: /h2

  flyway:
    enabled: false       # desliga até você criar as migrações
